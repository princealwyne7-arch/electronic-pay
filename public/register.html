<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register</title>
<style>
body{margin:0;font-family:Arial;background:#f4f6f9;display:flex;align-items:center;justify-content:center;height:100vh}
.box{background:white;padding:30px;border-radius:10px;box-shadow:0 5px 20px rgba(0,0,0,0.1);width:350px}
h2{text-align:center;color:#0d6efd}
input{width:100%;padding:12px;margin:8px 0;border:1px solid #ccc;border-radius:6px}
button{width:100%;padding:12px;background:#0d6efd;color:white;border:none;border-radius:6px;font-size:16px}
a{display:block;text-align:center;margin-top:10px;color:#0d6efd;text-decoration:none}
</style>
</head>
<body>

<div class="box">
<h2>Create Account</h2>

<input id="name" placeholder="Full name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<div id="msg"></div>

<a href="index.html">Back to login</a>
</div>

<script>
const baseURL=window.location.origin;

async function register(){

const name=document.getElementById("name").value;
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

const res=await fetch(baseURL+"/api/auth/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,email,password})
});

const data=await res.json();

document.getElementById("msg").innerText=data.message||JSON.stringify(data);

}
</script>

</body>
</html>
