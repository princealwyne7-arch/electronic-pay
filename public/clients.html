<!DOCTYPE html>
<html>
<head>
<title>Enterprise Clients Management</title>
<style>
body{background:#020617;color:white;font-family:Arial;padding:30px}
.card{background:#0f172a;padding:20px;border-radius:8px;margin-bottom:20px}
button{padding:8px 15px;margin:5px;background:#00d2ff;border:none;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #1e293b}
.status-Active{color:#39ff14}
.status-Suspended{color:#ffcc00}
.status-Frozen{color:#ff3131}
</style>
</head>
<body>

<h1>Enterprise Clients Management</h1>

<div class="card">
<h3>Add New Client</h3>
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="id" placeholder="National ID">
<input id="balance" placeholder="Initial Balance">
<button onclick="createClient()">Create</button>
</div>

<div class="card">
<h3>Clients Table</h3>
<table>
<thead>
<tr>
<th>Name</th><th>Phone</th><th>Email</th><th>Balance</th><th>Status</th><th>Action</th>
</tr>
</thead>
<tbody id="clientTable"></tbody>
</table>
</div>

<script>
async function loadClients(){
const res=await fetch('/api/clients');
const data=await res.json();
const table=document.getElementById("clientTable");
table.innerHTML="";
data.forEach(c=>{
table.innerHTML+=`
<tr>
<td>${c.fullName}</td>
<td>${c.phone}</td>
<td>${c.email}</td>
<td>KES ${c.balance}</td>
<td class="status-${c.status}">${c.status}</td>
<td>
<button onclick="freeze('${c._id}')">Freeze</button>
<button onclick="activate('${c._id}')">Activate</button>
<button onclick="del('${c._id}')">Delete</button>
</td>
</tr>`;
});
}

async function createClient(){
await fetch('/api/clients/create',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
fullName:name.value,
phone:phone.value,
email:email.value,
nationalId:id.value,
balance:balance.value
})
});
loadClients();
}

async function freeze(id){await fetch('/api/clients/freeze/'+id,{method:'PUT'});loadClients();}
async function activate(id){await fetch('/api/clients/activate/'+id,{method:'PUT'});loadClients();}
async function del(id){await fetch('/api/clients/'+id,{method:'DELETE'});loadClients();}

loadClients();
</script>

</body>
</html>
