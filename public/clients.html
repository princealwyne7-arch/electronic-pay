<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANKING CONTROL | CLIENT ARCHITECTURE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --neon: #00d2ff; --green: #39ff14; --red: #ff3131; --gold: #ffcc00; --glass: rgba(15, 23, 42, 0.98); --border: 1px solid rgba(0, 210, 255, 0.3); }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; overflow-x: hidden; }
        
        /* DASHBOARD - 6 CARDS */
        .dash-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 25px; }
        .stat-card { background: var(--glass); border: var(--border); padding: 15px; border-radius: 4px; text-align: center; }
        .stat-card label { font-size: 9px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; display: block; }
        .stat-card div { font-family: 'Orbitron'; font-size: 15px; margin-top: 5px; color: var(--neon); }

        /* TOOLS & SEARCH */
        .tool-panel { display: flex; gap: 15px; margin-bottom: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 8px; border: var(--border); }
        .search-input { flex: 1; background: #000; border: 1px solid #1e293b; color: white; padding: 10px 15px; border-radius: 4px; font-family: 'Roboto Mono'; font-size: 13px; }
        .btn-core { padding: 10px 20px; background: transparent; border: 1px solid var(--neon); color: white; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .btn-core:hover { background: var(--neon); color: black; }

        /* TABLE - 10 COLUMNS */
        .table-wrap { background: var(--glass); border: var(--border); border-radius: 8px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: rgba(0,0,0,0.5); padding: 15px; text-align: left; color: #64748b; font-weight: 500; border-bottom: var(--border); text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .prof-thumb { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--neon); background: #1e293b; }
        .status-pill { padding: 4px 8px; border-radius: 3px; font-size: 9px; font-weight: bold; }
        .active { background: rgba(57,255,20,0.1); color: var(--green); }
        .frozen { background: rgba(255,49,49,0.1); color: var(--red); }
        .suspended { background: rgba(255,204,0,0.1); color: var(--gold); }

        /* ADVANCED MODAL (Dossier & Forms) */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; align-items:center; justify-content:center; }
        .modal-box { width: 950px; background: var(--bg); border: 2px solid var(--neon); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; max-height: 90vh; }
        .modal-header { padding: 25px; border-bottom: var(--border); display: flex; justify-content: space-between; background: rgba(0,210,255,0.05); }
        .modal-tabs { display: flex; background: rgba(0,0,0,0.5); border-bottom: var(--border); }
        .tab-btn { padding: 15px 25px; background: transparent; color: #64748b; border: none; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; border-right: 1px solid rgba(255,255,255,0.05); }
        .tab-btn.active { color: var(--neon); background: rgba(255,255,255,0.03); border-bottom: 2px solid var(--neon); }
        .modal-body { padding: 30px; overflow-y: auto; }
        
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 40px; }
        .sec-title { font-family: 'Orbitron'; color: var(--gold); font-size: 11px; margin-bottom: 20px; border-left: 3px solid var(--gold); padding-left: 10px; letter-spacing: 1px; }
        .data-item { margin-bottom: 18px; }
        .data-item label { display: block; font-size: 10px; color: #475569; margin-bottom: 5px; }
        .data-item span { font-size: 13px; font-weight: 600; }

        /* FORMS */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-input { background: #000; border: 1px solid #1e293b; color: white; padding: 12px; border-radius: 4px; font-size: 13px; }
    </style>
</head>
<body>

    <div class="dash-grid">
        <div class="stat-card"><label>Total Clients</label><div id="stat-total">3,142</div></div>
        <div class="stat-card"><label>Active Clients</label><div style="color:var(--green)">2,904</div></div>
        <div class="stat-card"><label>Suspended</label><div style="color:var(--gold)">118</div></div>
        <div class="stat-card"><label>Frozen Accounts</label><div style="color:var(--red)">120</div></div>
        <div class="stat-card"><label>New Today</label><div>+14</div></div>
        <div class="stat-card"><label>Total Balances</label><div style="font-size:11px">KES 4.28B</div></div>
    </div>

    <div class="tool-panel">
        <input type="text" class="search-input" id="smartSearch" placeholder="SMART SEARCH (NAME, ACC, PHONE, EMAIL)..." onkeyup="searchClients()">
        <button class="btn-core" onclick="openAddForm()">+ ADD NEW CLIENT</button>
        <button class="btn-core" onclick="fetchClients()">REFRESH SYNC</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Photo</th>
                    <th>Client Name</th>
                    <th>Account No.</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Balance</th>
                    <th>Status</th>
                    <th>Risk</th>
                    <th>Created</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="clientRows"></tbody>
        </table>
    </div>

    <div id="masterModal" class="modal">
        <div class="modal-box" id="modalContent"></div>
    </div>

    <script>
        const play = (id) => {
            const sfx = new Audio(`https://raw.githubusercontent.com/princealwyne7-arch/assets/main/sys_fx_${id}.mp3`);
            sfx.volume = 0.4;
            sfx.play().catch(e => {});
        };

        async function fetchClients(q = '') {
            const res = await fetch(`/api/clients/data?search=${q}`);
            const data = await res.json();
            const list = document.getElementById('clientRows');
            list.innerHTML = '';
            
            data.forEach(c => {
                list.innerHTML += `
                    <tr>
                        <td><div class="prof-thumb"></div></td>
                        <td><b>${c.name}</b></td>
                        <td style="font-family:monospace">${c.acc}</td>
                        <td>${c.phone}</td>
                        <td>${c.email}</td>
                        <td style="color:var(--neon)">KES ${c.balance.toLocaleString()}</td>
                        <td><span class="status-pill ${c.status.toLowerCase()}">${c.status}</span></td>
                        <td style="color:${c.risk==='High'?'var(--red)':'var(--green)'}">${c.risk}</td>
                        <td>${c.created}</td>
                        <td><button class="btn-core" onclick="viewDossier('${c.id}')">ACTIONS</button></td>
                    </tr>
                `;
            });
        }

        function viewDossier(id) {
            play(4);
            fetch(`/api/clients/data`).then(r => r.json()).then(data => {
                const c = data.find(i => i.id === id);
                const modal = document.getElementById('masterModal');
                modal.style.display = 'flex';
                document.getElementById('modalContent').innerHTML = `
                    <div class="modal-header">
                        <h2 style="font-family:Orbitron; margin:0">CLIENT DOSSIER: ${c.acc}</h2>
                        <button class="btn-core" onclick="closeModal()">TERMINAL EXIT</button>
                    </div>
                    <div class="modal-tabs">
                        <div class="tab-btn active">DOSSIER</div>
                        <div class="tab-btn">TRANSACTIONS</div>
                        <div class="tab-btn">TRANSFERS</div>
                        <div class="tab-btn">DEPOSITS</div>
                        <div class="tab-btn">WITHDRAWALS</div>
                        <div class="tab-btn">LOGIN HISTORY</div>
                    </div>
                    <div class="modal-body">
                        <div class="grid-3">
                            <div class="info-sec">
                                <div class="sec-title">PERSONAL INFO</div>
                                <div class="data-item"><label>Full Name</label><span>${c.name}</span></div>
                                <div class="data-item"><label>Phone</label><span>${c.phone}</span></div>
                                <div class="data-item"><label>Email</label><span>${c.email}</span></div>
                                <div class="data-item"><label>National ID / Passport</label><span>${c.idNumber}</span></div>
                                <div class="data-item"><label>Home Address</label><span>${c.address}</span></div>
                                <div class="data-item"><label>Date Registered</label><span>${c.created}</span></div>
                                <div class="data-item"><label>Last Login</label><span>${c.lastLogin}</span></div>
                            </div>
                            <div class="info-sec">
                                <div class="sec-title">ACCOUNT INFO</div>
                                <div class="data-item"><label>Current Balance</label><span style="color:var(--neon)">KES ${c.balance.toLocaleString()}</span></div>
                                <div class="data-item"><label>Account Type</label><span>${c.type}</span></div>
                                <div class="data-item"><label>Account Status</label><span>${c.status}</span></div>
                                <div class="data-item"><label>Risk Level Index</label><span>${c.risk}</span></div>
                                <div class="sec-title" style="margin-top:30px">FINANCIAL SUMMARY</div>
                                <div class="data-item"><label>Total Deposits</label><span>KES ${c.deposits.toLocaleString()}</span></div>
                                <div class="data-item"><label>Total Withdrawals</label><span>KES ${c.withdrawals.toLocaleString()}</span></div>
                                <div class="data-item"><label>Total Transfers</label><span>KES ${c.transfers.toLocaleString()}</span></div>
                            </div>
                            <div class="info-sec">
                                <div class="sec-title">CONTROL PANEL</div>
                                <button class="btn-core" style="width:100%; margin-bottom:10px" onclick="controlAction('${c.id}', 'Activate')">ACTIVATE CLIENT</button>
                                <button class="btn-core" style="width:100%; margin-bottom:10px; border-color:var(--gold); color:var(--gold)" onclick="controlAction('${c.id}', 'Suspend')">SUSPEND CLIENT</button>
                                <button class="btn-core" style="width:100%; margin-bottom:10px; border-color:var(--red); color:var(--red)" onclick="controlAction('${c.id}', 'Freeze')">FREEZE CLIENT</button>
                                <button class="btn-core" style="width:100%; margin-bottom:10px" onclick="controlAction('${c.id}', 'Unfreeze')">UNFREEZE CLIENT</button>
                                <button class="btn-core" style="width:100%; margin-bottom:10px" onclick="alert('Password Reset to Default: Bank1234')">RESET PASSWORD</button>
                                <button class="btn-core" style="width:100%; border-color:#475569; color:#475569" onclick="controlAction('${c.id}', 'Delete')">DELETE CLIENT</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function openAddForm() {
            play(15);
            const modal = document.getElementById('masterModal');
            modal.style.display = 'flex';
            document.getElementById('modalContent').innerHTML = `
                <div class="modal-header">
                    <h2 style="font-family:Orbitron; margin:0">PROVISION NEW CLIENT</h2>
                    <button class="btn-core" onclick="closeModal()">CANCEL</button>
                </div>
                <div class="modal-body">
                    <div class="form-grid">
                        <input type="text" class="form-input" id="f-name" placeholder="FULL NAME">
                        <input type="text" class="form-input" id="f-phone" placeholder="PHONE">
                        <input type="email" class="form-input" id="f-email" placeholder="EMAIL">
                        <input type="password" class="form-input" id="f-pass" placeholder="PASSWORD">
                        <input type="text" class="form-input" id="f-id" placeholder="NATIONAL ID">
                        <input type="number" class="form-input" id="f-bal" placeholder="INITIAL BALANCE">
                    </div>
                    <button class="btn-core" style="width:100%; margin-top:30px; background:var(--neon); color:black" onclick="submitClient()">EXECUTE PROVISIONING</button>
                </div>
            `;
        }

        async function controlAction(id, action) {
            play(11);
            await fetch('/api/clients/control', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id, action})
            });
            alert('System Response: ' + action + ' Successful');
            closeModal();
            fetchClients();
        }

        function searchClients() { fetchClients(document.getElementById('smartSearch').value); }
        function closeModal() { play(10); document.getElementById('masterModal').style.display='none'; }
        fetchClients();
    </script>
</body>
</html>
