<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLIENT INTEL | GLOBAL BANK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Roboto+Mono&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-deep: #020617; --neon-blue: #00d2ff; --neon-red: #ff3131; --neon-green: #39ff14; --glass: rgba(15, 23, 42, 0.98); }
        body { background: var(--bg-deep); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 25px; }
        .header-bar { border-bottom: 1px solid rgba(0,210,255,0.2); padding-bottom: 20px; display: flex; justify-content: space-between; }
        .grid-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 25px 0; }
        .stat-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; text-align: center; }
        .stat-card h3 { font-family: 'Orbitron'; color: var(--neon-blue); margin: 10px 0 0; }
        
        .search-bar { width: 100%; padding: 15px; background: #000; border: 1px solid var(--neon-blue); color: white; border-radius: 5px; margin-bottom: 20px; font-family: 'Roboto Mono'; }
        
        .intel-table { width: 100%; border-collapse: collapse; background: var(--glass); border-radius: 8px; overflow: hidden; }
        .intel-table th { background: rgba(0,210,255,0.1); padding: 15px; text-align: left; font-family: 'Orbitron'; font-size: 11px; color: var(--neon-blue); }
        .intel-table td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; }
        
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); z-index:9999; padding:50px; }
        .modal-content { max-width: 900px; margin: auto; background: var(--glass); border: 1px solid var(--neon-blue); padding: 30px; border-radius: 12px; }
        .btn { padding: 8px 15px; background: transparent; border: 1px solid var(--neon-blue); color: white; cursor: pointer; font-family: 'Orbitron'; font-size: 10px; }
        .btn-red { border-color: var(--neon-red); color: var(--neon-red); }
        .log-box { background: #000; height: 150px; overflow-y: scroll; padding: 10px; border: 1px solid #1e293b; color: var(--neon-green); font-family: 'Roboto Mono'; font-size: 11px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="header-bar">
        <div><h1 style="font-family:Orbitron; color:var(--neon-blue); margin:0;">CLIENT INTELLIGENCE TERMINAL</h1><small>GLOBAL NODE ACCESS</small></div>
        <button class="btn" onclick="location.href='/'">RETURN TO DASHBOARD</button>
    </div>

    <div class="grid-stats">
        <div class="stat-card"><span>TOTAL NODES</span><h3 id="stat-total">0</h3></div>
        <div class="stat-card"><span>ACTIVE</span><h3 id="stat-active" style="color:var(--neon-green)">0</h3></div>
        <div class="stat-card"><span>FROZEN</span><h3 id="stat-frozen" style="color:var(--neon-red)">0</h3></div>
        <div class="stat-card"><span>NEW TODAY</span><h3 id="stat-new">0</h3></div>
    </div>

    <input type="text" class="search-bar" id="search" placeholder="SEARCH BY NAME, ACC, PHONE, OR EMAIL..." onkeyup="filter()">

    <table class="intel-table">
        <thead>
            <tr><th>CLIENT IDENTITY</th><th>ACC NUMBER</th><th>BALANCE</th><th>RISK</th><th>STATUS</th><th>ACTIONS</th></tr>
        </thead>
        <tbody id="client-list"></tbody>
    </table>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="m-name" style="font-family:Orbitron; color:var(--neon-blue);"></h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px;">
                <div>
                    <p><b>Account:</b> <span id="m-acc"></span></p>
                    <p><b>National ID:</b> <span id="m-id"></span></p>
                    <p><b>Risk Level:</b> <span id="m-risk"></span></p>
                </div>
                <div>
                    <p style="color:var(--neon-green)"><b>Total Deposits:</b> <span id="m-dep"></span></p>
                    <p style="color:var(--neon-red)"><b>Total Withdrawals:</b> <span id="m-with"></span></p>
                </div>
            </div>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button class="btn" onclick="control('freeze')">FREEZE ACCOUNT</button>
                <button class="btn" onclick="control('unfreeze')">ACTIVATE</button>
                <button class="btn btn-red" onclick="control('logout')">FORCE LOGOUT</button>
            </div>
            <div class="log-box" id="m-logs"></div>
            <br><button class="btn" onclick="document.getElementById('modal').style.display='none'">CLOSE TERMINAL</button>
        </div>
    </div>

    <script>
        let activeId = null;
        async function load() {
            const r = await fetch('/api/clients');
            const d = await r.json();
            document.getElementById('stat-total').innerText = d.stats.total;
            document.getElementById('stat-active').innerText = d.stats.active;
            document.getElementById('stat-frozen').innerText = d.stats.frozen;
            document.getElementById('stat-new').innerText = d.stats.newToday;

            document.getElementById('client-list').innerHTML = d.clients.map(c => `
                <tr>
                    <td><b>${c.name}</b><br><small>${c.email}</small></td>
                    <td style="font-family:Roboto Mono">${c.acc}</td>
                    <td style="color:var(--neon-blue)">KES ${c.balance.toLocaleString()}</td>
                    <td style="color:${c.riskLevel=='High'?'var(--neon-red)':'white'}">${c.riskLevel}</td>
                    <td style="color:${c.status=='Frozen'?'var(--neon-red)':'var(--neon-green)'}">${c.status}</td>
                    <td><button class="btn" onclick="openProfile(${c.id})">VIEW INTEL</button></td>
                </tr>
            `).join('');
        }

        async function openProfile(id) {
            activeId = id;
            const r = await fetch('/api/clients/'+id+'/details');
            const c = await r.json();
            document.getElementById('m-name').innerText = c.name;
            document.getElementById('m-acc').innerText = c.acc;
            document.getElementById('m-id').innerText = c.idNo;
            document.getElementById('m-risk').innerText = c.riskLevel;
            document.getElementById('m-dep').innerText = "KES " + c.totalDeposits.toLocaleString();
            document.getElementById('m-with').innerText = "KES " + c.totalWithdrawals.toLocaleString();
            document.getElementById('m-logs').innerHTML = c.logs.map(l => `<div>${l}</div>`).join('');
            document.getElementById('modal').style.display = 'block';
        }

        async function control(action) {
            await fetch('/api/clients/'+activeId+'/control', {
                method: 'PATCH', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ action })
            });
            openProfile(activeId); load();
        }

        function filter() {
            let val = document.getElementById('search').value.toUpperCase();
            let rows = document.querySelectorAll('#client-list tr');
            rows.forEach(r => r.style.display = r.innerText.toUpperCase().includes(val) ? '' : 'none');
        }
        window.onload = load;
    </script>
</body>
</html>
