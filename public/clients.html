<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLIENTS MANAGEMENT | GLOBAL BANK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Roboto+Mono&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617; --bg-panel: rgba(15, 23, 42, 0.98);
            --neon-blue: #00d2ff; --neon-green: #39ff14; --neon-red: #ff3131;
            --glass-border: 1px solid rgba(0, 210, 255, 0.2);
        }
        body { background: var(--bg-deep); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; overflow-x: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: var(--glass-border); padding-bottom: 20px; margin-bottom: 20px; }
        .grid-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-panel); border: var(--glass-border); padding: 15px; border-radius: 8px; text-align: center; }
        .stat-card h3 { font-family: 'Orbitron'; color: var(--neon-blue); margin: 5px 0; }
        
        .search-box { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: var(--glass-border); color: white; border-radius: 5px; margin-bottom: 20px; }
        
        .table-wrap { background: var(--bg-panel); border: var(--glass-border); border-radius: 8px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: rgba(0,210,255,0.1); padding: 15px; text-align: left; font-family: 'Orbitron'; font-size: 11px; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .btn { padding: 8px 12px; border: 1px solid var(--neon-blue); background: transparent; color: white; font-size: 10px; cursor: pointer; font-family: 'Orbitron'; }
        .btn-suspend { border-color: #ffcc00; color: #ffcc00; }
        .btn-delete { border-color: var(--neon-red); color: var(--neon-red); }
        .btn-add { background: var(--neon-blue); color: black; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1 style="font-family:'Orbitron'; color:var(--neon-blue); margin:0;">CLIENTS MASTER MODULE</h1>
            <small>GLOBAL DIGITAL ASSET MANAGEMENT v4.0</small>
        </div>
        <button class="btn" onclick="location.href='/'">RETURN TO DASHBOARD</button>
    </div>

    <div class="grid-stats">
        <div class="stat-card"><span>TOTAL USERS</span><h3 id="stat-total">0</h3></div>
        <div class="stat-card"><span>ACTIVE</span><h3 id="stat-active" style="color:var(--neon-green)">0</h3></div>
        <div class="stat-card"><span>SUSPENDED</span><h3 id="stat-suspended" style="color:var(--neon-red)">0</h3></div>
    </div>

    <input type="text" class="search-box" id="search" placeholder="SEARCH BY NAME, ACC, OR PHONE..." onkeyup="filterClients()">
    
    <button class="btn btn-add" onclick="createClient()">+ ENROLL NEW CLIENT</button>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>CLIENT NAME</th><th>ACC NO.</th><th>PHONE</th><th>BALANCE (KES)</th><th>STATUS</th><th>ACTIONS</th>
                </tr>
            </thead>
            <tbody id="client-list">
                </tbody>
        </table>
    </div>

    <script>
        async function loadClients() {
            const res = await fetch('/api/clients');
            const data = await res.json();
            
            document.getElementById('stat-total').innerText = data.stats.total;
            document.getElementById('stat-active').innerText = data.stats.active;
            document.getElementById('stat-suspended').innerText = data.stats.suspended;

            const list = document.getElementById('client-list');
            list.innerHTML = data.clients.map(c => `
                <tr>
                    <td><b>${c.name}</b><br><small>${c.email}</small></td>
                    <td style="font-family:'Roboto Mono'">${c.acc}</td>
                    <td>${c.phone}</td>
                    <td style="color:var(--neon-blue)">${c.balance.toLocaleString()}</td>
                    <td><span style="color:${c.status === 'Active' ? 'var(--neon-green)' : 'var(--neon-red)'}">${c.status}</span></td>
                    <td>
                        <button class="btn" onclick="alert('Profile: ${c.name}\\nBalance: KES ${c.balance}')">VIEW</button>
                        <button class="btn btn-suspend" onclick="toggleStatus(${c.id})">${c.status === 'Active' ? 'SUSPEND' : 'ACTIVATE'}</button>
                        <button class="btn btn-delete" onclick="deleteClient(${c.id})">DEL</button>
                    </td>
                </tr>
            `).join('');
        }

        async function createClient() {
            const name = prompt("Client Name:");
            const phone = prompt("Phone Number:");
            if(!name || !phone) return;
            
            await fetch('/api/clients', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, phone, email: name.toLowerCase().replace(' ','')+'@global.bank', balance: 0 })
            });
            loadClients();
        }

        async function toggleStatus(id) {
            await fetch(`/api/clients/${id}/status`, { method: 'PATCH' });
            loadClients();
        }

        async function deleteClient(id) {
            if(confirm("Permanently delete this node from the banking ledger?")) {
                await fetch(`/api/clients/${id}`, { method: 'DELETE' });
                loadClients();
            }
        }

        function filterClients() {
            let input = document.getElementById('search').value.toUpperCase();
            let rows = document.getElementById('client-list').getElementsByTagName('tr');
            for (let row of rows) {
                row.style.display = row.innerText.toUpperCase().includes(input) ? "" : "none";
            }
        }

        window.onload = loadClients;
    </script>
</body>
</html>
