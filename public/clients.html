<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLIENT CONTROL | GLOBAL BANK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --neon-gold: #ffcc00;
            --glass: rgba(15, 23, 42, 0.9);
            --border: 1px solid rgba(0, 210, 255, 0.2);
        }
        body { background: var(--bg-deep); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        
        .header-strip { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .title-box h1 { font-family: 'Orbitron'; color: var(--neon-blue); margin: 0; font-size: 24px; }

        /* DASHBOARD CARDS */
        .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--glass); border: var(--border); padding: 20px; border-radius: 8px; position: relative; }
        .stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-family: 'Orbitron'; font-size: 20px; margin-top: 5px; }

        /* CONTROL BAR */
        .control-bar { display: flex; gap: 15px; margin-bottom: 20px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; border: var(--border); }
        .search-input { flex: 1; background: #000; border: 1px solid #1e293b; color: white; padding: 10px 15px; border-radius: 4px; }
        .btn { padding: 10px 20px; font-family: 'Orbitron'; font-size: 11px; cursor: pointer; border: 1px solid var(--neon-blue); background: transparent; color: white; transition: 0.3s; }
        .btn:hover { background: var(--neon-blue); color: black; }
        .btn-add { background: var(--neon-blue); color: black; }

        /* DATA TABLE */
        .table-wrap { background: var(--glass); border: var(--border); border-radius: 10px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: rgba(0,0,0,0.5); padding: 15px; text-align: left; color: #64748b; font-weight: 500; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .prof-circle { width: 32px; height: 32px; border-radius: 50%; background: #1e293b; display: inline-block; vertical-align: middle; margin-right: 10px; border: 1px solid var(--neon-blue); }
        .status-tag { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .risk-low { color: var(--neon-green); }
        .risk-high { color: var(--neon-red); }

        /* MODAL (PROFILE VIEW) */
        #profile-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; align-items:center; justify-content:center; }
        .profile-card { width: 700px; background: var(--bg-deep); border: 1px solid var(--neon-blue); padding: 30px; border-radius: 12px; max-height: 80vh; overflow-y: auto; }
        .tab-menu { display: flex; gap: 20px; border-bottom: 1px solid #1e293b; margin: 20px 0; padding-bottom: 10px; }
        .tab-link { cursor: pointer; color: #64748b; font-size: 12px; font-weight: bold; }
        .tab-active { color: var(--neon-blue); border-bottom: 2px solid var(--neon-blue); }
    </style>
</head>
<body>

    <div class="header-strip">
        <div class="title-box">
            <h1>CLIENT ARCHITECTURE</h1>
            <small style="color:#64748b">GLOBAL ADMINISTRATION PANEL V4.0</small>
        </div>
        <button class="btn btn-add" onclick="alert('Launch Add Client UI')">+ PROVISION NEW CLIENT</button>
    </div>

    <div class="dash-grid">
        <div class="stat-card"><div class="stat-label">Total Assets</div><div class="stat-value">KES 4.2B</div></div>
        <div class="stat-card"><div class="stat-label">Active Users</div><div class="stat-value" style="color:var(--neon-green)">12,402</div></div>
        <div class="stat-card"><div class="stat-label">Frozen</div><div class="stat-value" style="color:var(--neon-red)">14</div></div>
        <div class="stat-card"><div class="stat-label">Risk Alerts</div><div class="stat-value" style="color:var(--neon-gold)">3</div></div>
    </div>

    <div class="control-bar">
        <input type="text" class="search-input" placeholder="Search by Name, Account, Email or Phone..." id="searchBox">
        <button class="btn" onclick="fetchClients()">REFRESH LEDGER</button>
    </div>

    <div class="table-wrap">
        <table id="clientsTable">
            <thead>
                <tr>
                    <th>CLIENT IDENTITY</th>
                    <th>ACCOUNT NO.</th>
                    <th>BALANCE</th>
                    <th>STATUS</th>
                    <th>RISK</th>
                    <th>ACTIONS</th>
                </tr>
            </thead>
            <tbody id="clientRows">
                </tbody>
        </table>
    </div>

    <div id="profile-modal">
        <div class="profile-card" id="profileContent">
            </div>
    </div>

    <script>
        async function fetchClients() {
            const query = document.getElementById('searchBox').value;
            const res = await fetch(`/api/clients/data?search=${query}`);
            const data = await res.json();
            const container = document.getElementById('clientRows');
            container.innerHTML = '';

            data.forEach(c => {
                container.innerHTML += `
                    <tr>
                        <td><div class="prof-circle"></div> <b>${c.name}</b><br><small style="color:#64748b">${c.email}</small></td>
                        <td style="font-family:monospace">${c.account}</td>
                        <td style="color:var(--neon-blue)">KES ${c.balance.toLocaleString()}</td>
                        <td><span class="status-tag" style="background:rgba(255,255,255,0.05)">${c.status}</span></td>
                        <td class="risk-${c.risk.toLowerCase()}">${c.risk}</td>
                        <td><button class="btn" style="padding:5px 10px; font-size:9px" onclick="viewProfile('${c.account}')">VIEW</button></td>
                    </tr>
                `;
            });
        }

        function viewProfile(acc) {
            document.getElementById('profile-modal').style.display = 'flex';
            document.getElementById('profileContent').innerHTML = `
                <div style="display:flex; justify-content:space-between">
                    <h2 style="font-family:Orbitron; color:var(--neon-blue)">CLIENT DOSSIER</h2>
                    <button class="btn" onclick="document.getElementById('profile-modal').style.display='none'">CLOSE</button>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:20px;">
                    <div>
                        <h3 style="font-size:12px; color:var(--neon-gold)">PERSONAL INFO</h3>
                        <p><small>Full Name:</small><br><b>Client Name Here</b></p>
                        <p><small>Account:</small><br><b>${acc}</b></p>
                    </div>
                    <div>
                        <h3 style="font-size:12px; color:var(--neon-gold)">FINANCIAL SUMMARY</h3>
                        <p><small>Current Balance:</small><br><b style="color:var(--neon-green)">KES 1,200,000</b></p>
                        <p><small>Risk Factor:</small><br><b class="risk-low">MINIMAL</b></p>
                    </div>
                </div>
                <div class="tab-menu">
                    <span class="tab-link tab-active">TRANSACTIONS</span>
                    <span class="tab-link">TRANSFERS</span>
                    <span class="tab-link">LOGINS</span>
                </div>
                <div style="height:100px; background:rgba(0,0,0,0.3); border-radius:5px; padding:10px; font-size:11px; color:#64748b">
                    Fetching encrypted ledger logs...
                </div>
                <div style="margin-top:25px; display:flex; gap:10px;">
                    <button class="btn" style="border-color:var(--neon-gold); color:var(--neon-gold)">SUSPEND</button>
                    <button class="btn" style="border-color:var(--neon-red); color:var(--neon-red)">FREEZE ASSETS</button>
                    <button class="btn">RESET SECURE KEY</button>
                </div>
            `;
        }

        fetchClients();
        document.getElementById('searchBox').oninput = fetchClients;
    </script>
</body>
</html>
