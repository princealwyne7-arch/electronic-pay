<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{font-family:sans-serif;background:#f8fafc;margin:0;padding-bottom:40px;text-align:center}
        .top-banner{width:100%;background:linear-gradient(135deg,#28a745,#1e7e34);padding:40px 0;margin-bottom:-50px;border-radius:0 0 30px 30px;display:flex;justify-content:center}
        .profile-pic{width:100px;height:100px;border-radius:50%;border:4px solid white;object-fit:cover;background:white}
        .container{background:white;padding:25px;border-radius:25px;width:90%;max-width:400px;box-shadow:0 8px 20px rgba(0,0,0,0.08);margin:0 auto 15px auto;position:relative;z-index:2}
        input{width:100%;padding:15px;margin-bottom:10px;border:1px solid #e2e8f0;border-radius:12px;font-size:16px;box-sizing:border-box}
        .btn-send{width:100%;padding:18px;background:#28a745;color:white;border:none;border-radius:12px;font-size:18px;font-weight:bold;cursor:pointer}
        .total-box{background:#e8f5e9;padding:12px;border-radius:12px;margin-bottom:15px;color:#2e7d32;font-weight:bold}
        .history-card{width:90%;max-width:400px;background:white;border-radius:20px;padding:20px;margin:10px auto;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
    
    #main-content > div { display: none; }
    #main-content > div.active { display: block; }
    .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); z-index: 100; border-top: 1px solid #eee; }
    .nav-item { color: #94a3b8; font-size: 11px; text-decoration: none; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
    .nav-item.active { color: #28a745; font-weight: bold; }
    .nav-icon { font-size: 20px; margin-bottom: 4px; }
</style>
</head>
<body>
    <div id='main-content' style='padding-bottom: 80px;'>
        <div id='tab-home' class='active'>
            <div class='container' style='margin-top:60px'>
                <h2>Electronic Pay</h2>
                <div id='dailyTotal' class='total-box'>Today: KES 0</div>
                <form id='payForm' action='/push' method='POST'>
                    <input type='password' name='password' id='passInput' placeholder='Manager PIN' required>
                    <input type='number' name='phone' placeholder='2547...' required>
                    <input type='number' name='amount' placeholder='Amount' required>
                    <button type='submit' class='btn-send'>SEND STK PUSH</button>
                </form>
            </div>
        </div>
        
        <div id='tab-activity'>
            <div class='history-card' style='margin-top:60px'>
                <h3>Live Activity</h3>
                <div id='list'>Checking system...</div>
            </div>
        </div>

        <div id='tab-settings'>
            
    <div class='history-card' style='margin-top:20px; border: 1px solid #e2e8f0;'>
        <h4 style='margin:0 0 15px 0; color:#1e293b;'>🔔 Notification Sounds</h4>
        <div style='background:#f8fafc; padding:15px; border-radius:12px;'>
            <label style='font-size:12px; color:#64748b; display:block; margin-bottom:8px;'>Choose Your Alert Tone:</label>
            <select id='soundSelect' onchange='previewSound()' style='width:100%; padding:12px; border-radius:10px; border:1px solid #cbd5e1; background:white; font-size:14px;'>
                <option value='https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3'>1. Default Chime (Success)</option>
                <option value='https://nfc-pro.com/sounds/success.mp3'>2. High-Tech Beep</option>
                <option value='https://nfc-pro.com/sounds/alert.mp3'>3. Modern Alert</option>
                <option value='https://nfc-pro.com/sounds/notification.mp3'>4. Soft Ping</option>
                <option value='https://nfc-pro.com/sounds/coins.mp3'>5. Cash Register</option>
                <option value='https://nfc-pro.com/sounds/magic.mp3'>6. Fairy Dust</option>
                <option value='https://nfc-pro.com/sounds/level-up.mp3'>7. Achievement</option>
                <option value='https://nfc-pro.com/sounds/bubble.mp3'>8. Water Pop</option>
                <option value='https://nfc-pro.com/sounds/confirm.mp3'>9. Order Confirmed</option>
                <option value='https://nfc-pro.com/sounds/positive.mp3'>10. Professional Chime</option>
                <option value='https://nfc-pro.com/sounds/complete.mp3'>11. Task Complete</option>
                <option value='https://nfc-pro.com/sounds/arrival.mp3'>12. Funds Received</option>
            </select>
            <button onclick='previewSound()' style='margin-top:12px; width:100%; background:#e8f5e9; color:#2e7d32; border:none; padding:10px; border-radius:10px; font-weight:bold; cursor:pointer;'>Test Selected Sound</button>
        </div>
        <p style='font-size:10px; color:#94a3b8; margin-top:10px;'>Note: Tap 'Test' to enable audio permissions on this device.</p>
    </div>

            <div class='history-card'>
                <p>⚙️ <b>System Branding</b></p>
                <form action='/upload-logo' method='POST' enctype='multipart/form-data'>
                    <input type='file' name='logo' accept='image/*' onchange='this.form.submit()'>
                </form>
            </div>
        </div>
    </div>

    <nav class='nav-bar'>
        <div class='nav-item active' onclick='switchTab("home", this)'><span class='nav-icon'>🏠</span>Home</div>
        <div class='nav-item' onclick='switchTab("activity", this)'><span class='nav-icon'>📊</span>Activity</div>
        <div class='nav-item' onclick='switchTab("settings", this)'><span class='nav-icon'>⚙️</span>Settings</div>
    </nav>
<audio id="snd" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
    <script>
        let lastCount = 0;
        async function update(){
            try {
                const r = await fetch("/api/status");
                const d = await r.json();
                document.getElementById("dailyTotal").innerText = "Today: KES " + d.todayTotal;
                const active = d.transactions || [];
                if(active.length > lastCount) { previewSound(); lastCount = active.length; }
                document.getElementById("list").innerHTML = active.map(t => `<div style="border-bottom:1px solid #eee;padding:10px;text-align:left;"><b>${t.phone}</b> <span style="float:right">KES ${t.amount}</span><br><small>${t.time} - ${t.status}</small></div>`).join("") || "No activity";
            } catch(e){ document.getElementById("list").innerText = "Syncing..."; }
        }
        setInterval(update, 3000); 
    function testSound() { 
        const s = document.getElementById('snd');
        s.src = document.getElementById('soundSelect').value;
        s.play().catch(e => alert('Please tap the screen first to enable audio'));
    }

    function switchTab(tabId, el) {
        document.querySelectorAll('#main-content > div').forEach(div => div.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        el.classList.add('active');
    }

    function previewSound() {
        const s = document.getElementById('snd');
        s.src = document.getElementById('soundSelect').value;
        s.play().catch(e => console.log('Audio requires user tap'));
    }
update();
        const p = localStorage.getItem("mpin");
        const e = localStorage.getItem("mexp");
        if(p && Date.now() < e) document.getElementById("passInput").value = p;
        document.getElementById("payForm").onsubmit = () => {
            const val = document.getElementById("passInput").value;
            if(val === "5566") { localStorage.setItem("mpin", val); localStorage.setItem("mexp", Date.now() + 300000); }
        };
    </script>
</body>
</html>
